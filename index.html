<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<style>
		body { margin: 0; overflow: hidden; background: #000; }
		canvas { display: block; touch-action: none; }
		#editor-link {
			position: absolute;
			bottom: 12px;
			right: 16px;
			color: #fff;
			font: 14px sans-serif;
			text-decoration: none;
			background: rgba(0,0,0,0.5);
			padding: 8px 14px;
			border-radius: 6px;
			z-index: 10;
		}
		#editor-link:hover { background: rgba(0,0,0,0.7); }
		@media (pointer: coarse) {
			#editor-link { bottom: auto; top: 12px; right: 12px; }
		}
		#loading-screen {
			position: fixed;
			inset: 0;
			z-index: 100;
			background: #adb2ba;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-family: sans-serif;
			color: #3a3a3a;
			transition: opacity 0.4s ease;
		}
		#loading-screen.fade-out { opacity: 0; pointer-events: none; }
		#loading-spinner {
			width: 40px; height: 40px;
			border: 4px solid rgba(0,0,0,0.15);
			border-top-color: #3a3a3a;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin-bottom: 16px;
		}
		@keyframes spin { to { transform: rotate(360deg); } }
		#loading-status { font-size: 14px; opacity: 0.8; }
	</style>
  <script type="module" crossorigin src="/assets/main-DhXwlqae.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/Track-CrxqkQ4C.js">
  <link rel="stylesheet" crossorigin href="/assets/main-DBjssyqR.css">
</head>
<body>
	<div id="loading-screen">
		<div id="loading-spinner"></div>
		<div id="loading-status">Loading models…</div>
	</div>
	<div id="ui"></div>
</body>
</html>
